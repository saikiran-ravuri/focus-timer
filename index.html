<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Focus Timer</title>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <main class="app">

        <!-- header -->

        <header class="app-header">
            <span class="app-badge">
                PRODUCTIVITY
            </span>
            <h1 class="app-title">
                Focus Timer
            </h1>
            <p class="app-description">
                Boost your productivity through focused work sessions.
            </p>
        </header>

        <!-- focus timer dashboard -->

        <div class="timer-dashboard">

            <!-- timer card -->

            <div class="timer-card">

                <!-- duration -->

                <div class="duration-section">
                    <label
                        class="duration-label"
                        for="durationInput"
                    >
                        Focus Duration
                    </label>

                    <div class="duration-input-group">
                        <input
                            id="durationInput"
                            type="number"
                            min="1"
                            max="120"
                            value="25"
                            aria-describedby="durationHelp"
                        >
                        <span>
                            Minutes
                        </span>
                    </div>
                    <p class="duration-help" id="durationHelp">
                        Choose a duration between 1 and 120 minutes.
                    </p>
                </div>

                <!-- circular progress -->

                <div class="timer-container">
                    <svg
                        class="progress-ring"
                        width="260"
                        height="260"
                        role="progressbar"
                        aria-label="Focus session progress"
                        aria-valuemin="0"
                        aria-valuemax="100"
                        aria-valuenow="0"
                    >
                        <circle
                            class="progress-ring-track"
                            cx="130"
                            cy="130"
                            r="110"
                        />
                        <circle
                            class="progress-ring-fill"
                            id="progressRing"
                            cx="130"
                            cy="130"
                            r="110"
                        />
                    </svg>

                    <div class="timer-content">
                        <p
                            class="timer-display"
                            id="timerDisplay"
                        >
                            25:00
                        </p>
                        <p class="timer-label">
                            Remaining
                        </p>
                    </div>
                </div>

                <!-- controls -->

                <div class="controls">
                    <button
                        id="startButton"
                        class="button button-primary"
                        type="button"
                    >
                        <i data-lucide="play"></i>
                        <span>
                            Start
                        </span>
                    </button>

                    <button
                        id="pauseButton"
                        class="button button-secondary"
                        type="button"
                        disabled
                    >
                        <i data-lucide="pause"></i>
                        <span>
                            Pause
                        </span>
                    </button>

                    <button
                        id="resetButton"
                        class="button button-secondary"
                        type="button"
                        disabled
                    >
                        <i data-lucide="rotate-ccw"></i>
                        <span>
                            Reset
                        </span>
                    </button>
                </div>
            </div>

            <!-- information panel -->

            <aside class="information-panel">
                <article class="info-card">
                    <div class="info-icon">
                        <i data-lucide="target"></i>
                    </div>
                    <h3>
                        Current Session
                    </h3>
                    <p id="sessionName">
                        Focus Session
                    </p>
                </article>
                <article class="info-card">
                    <div class="info-icon">
                        <i data-lucide="activity"></i>
                    </div>
                    <h3>
                        Timer Status
                    </h3>
                    <p id="status" aria-live="polite">
                        Ready
                    </p>
                </article>
                <article class="info-card">
                    <div class="info-icon">
                        <i data-lucide="clock-3"></i>
                    </div>
                    <h3>
                        Remaining Time
                    </h3>
                    <p id="remainingTime">
                        25 Minutes
                    </p>
                </article>
            </aside>

        </div>
    </main>

    <!-- lucide Icons -->

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>

    <script src="js/script.js"></script>

</body>

</html>
